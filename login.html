<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift — Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--base-clr);
            grid-template-columns: unset;
            overflow: hidden;
        }

        /* Ambient glow blobs */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 {
            width: 500px; height: 500px;
            background: var(--accent-clr);
            top: -150px; left: -150px;
            animation: drift1 8s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            width: 400px; height: 400px;
            background: var(--accent-3-clr);
            bottom: -100px; right: -100px;
            animation: drift2 10s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0); }
            to   { transform: translate(60px, 40px); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0); }
            to   { transform: translate(-40px, -60px); }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 2.5rem 2.5rem 2rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line-clr);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .login-header {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .login-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 4px;
            color: var(--accent-clr);
            line-height: 1;
        }

        .login-tagline {
            font-size: 0.85rem;
            color: var(--secondary-text-clr);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .field label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .field input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--line-clr);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .field input::placeholder {
            color: var(--secondary-text-clr);
        }

        .field input:focus {
            border-color: var(--accent-clr);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
        }

        /* Password row */
        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forgot-link {
            font-size: 0.75rem;
            color: var(--accent-clr);
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .forgot-link:hover { opacity: 1; }

        /* Submit */
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-clr);
            border: none;
            border-radius: 99px;
            color: var(--base-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 0.4rem;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Ripple on click */
        .btn-login .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: scale(0);
            animation: ripple 0.5s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--secondary-text-clr);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line-clr);
        }

        /* Social buttons */
        .social-btns {
            display: flex;
            gap: 0.75rem;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.65rem;
            background: transparent;
            border: 1px solid var(--line-clr);
            border-radius: 10px;
            color: var(--text-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-social:hover {
            background: var(--hover-clr);
            border-color: #444460;
        }

        .btn-social svg {
            flex-shrink: 0;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--secondary-text-clr);
        }

        .login-footer a {
            color: var(--accent-clr);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover { text-decoration: underline; }

        /* Error state */
        .field input.error {
            border-color: #ff4d4d;
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.1);
        }

        .field .error-msg {
            font-size: 0.72rem;
            color: #ff4d4d;
            display: none;
        }

        .field input.error + .error-msg,
        .field .error-msg.show {
            display: block;
        }

        @media (max-width: 440px) {
            .login-card {
                width: 100%;
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-card">

        <div class="login-header">
            <span class="login-logo">Rift</span>
            <p class="login-tagline">There is no backend, any username and password , will work</p>
        </div>

        <div class="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                <span class="error-msg">Please enter a valid email.</span>
            </div>

            <div class="field">
                <div class="field-row">
                    <label for="password">Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <span class="error-msg">Password must be at least 6 characters.</span>
            </div>

            <button class="btn-login" id="login-btn">Sign In</button>
        </div>

        <p class="login-footer">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </p>

    </div>

    <script>
        // ── Ripple effect ──
        const loginBtn = document.getElementById('login-btn');

        loginBtn.addEventListener('click', function (e) {
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height);
            ripple.classList.add('ripple');
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
            ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);

            handleLogin();
        });

        function handleLogin() {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            let valid = true;
            const emailVal = emailInput.value.trim();
            if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
                emailInput.classList.add('error');
                emailInput.nextElementSibling.classList.add('show');
                valid = false;
            } else {
                emailInput.classList.remove('error');
                emailInput.nextElementSibling.classList.remove('show');
            }
            if (passwordInput.value.length < 6) {
                passwordInput.classList.add('error');
                passwordInput.nextElementSibling.classList.add('show');
                valid = false;
            } else {
                passwordInput.classList.remove('error');
                passwordInput.nextElementSibling.classList.remove('show');
            }

            if (valid) {
                loginBtn.textContent = 'Signing in…';
                loginBtn.disabled = true;
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
        document.querySelectorAll('.field input').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error');
                input.nextElementSibling.classList.remove('show');
            });
        });

    </script>
</body>
</html>
