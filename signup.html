<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift — Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--base-clr);
            grid-template-columns: unset;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 {
            width: 500px; height: 500px;
            background: var(--accent-3-clr);
            top: -150px; right: -150px;
            animation: drift1 9s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            width: 400px; height: 400px;
            background: var(--accent-clr);
            bottom: -100px; left: -100px;
            animation: drift2 11s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0); }
            to   { transform: translate(-50px, 40px); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0); }
            to   { transform: translate(40px, -50px); }
        }

        .signup-card {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 2.5rem 2.5rem 2rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line-clr);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .signup-header {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .signup-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 4px;
            color: var(--accent-clr);
            line-height: 1;
        }

        .signup-tagline {
            font-size: 0.85rem;
            color: var(--secondary-text-clr);
            font-weight: 300;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .field label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .field input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--line-clr);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .field input::placeholder { color: var(--secondary-text-clr); }

        .field input:focus {
            border-color: var(--accent-clr);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
        }

        .field input.error {
            border-color: #ff4d4d;
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.1);
        }

        .field .error-msg {
            font-size: 0.72rem;
            color: #ff4d4d;
            display: none;
        }

        .field .error-msg.show { display: block; }

        /* Password strength bar */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 2px;
        }

        .strength-bar span {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: var(--line-clr);
            transition: background 0.3s;
        }

        .strength-label {
            font-size: 0.7rem;
            color: var(--secondary-text-clr);
            margin-top: 2px;
        }

        /* Terms */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.78rem;
            color: var(--secondary-text-clr);
            line-height: 1.4;
        }

        .terms input[type="checkbox"] {
            accent-color: var(--accent-clr);
            width: 14px;
            height: 14px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .terms a {
            color: var(--accent-clr);
            text-decoration: none;
        }

        .terms a:hover { text-decoration: underline; }

        .btn-signup {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-clr);
            border: none;
            border-radius: 99px;
            color: var(--base-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 0.2rem;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-signup:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-signup:active { transform: translateY(0); }

        .btn-signup .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: scale(0);
            animation: ripple 0.5s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--secondary-text-clr);
            font-size: 0.75rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line-clr);
        }


        .signup-footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--secondary-text-clr);
        }

        .signup-footer a {
            color: var(--accent-clr);
            text-decoration: none;
            font-weight: 500;
        }

        .signup-footer a:hover { text-decoration: underline; }

        /* Toast */
        #social-toast {
            display: none;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--hover-clr);
            border: 1px solid var(--line-clr);
            color: var(--text-clr);
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            z-index: 999;
            white-space: nowrap;
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 440px) {
            .signup-card {
                width: 100%;
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div id="social-toast"></div>

    <div class="signup-card">

        <div class="signup-header">
            <span class="signup-logo">Rift</span>
            <p class="signup-tagline">Create your free account.</p>
        </div>

        <div class="signup-form">

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="coollistener99" autocomplete="username">
                <span class="error-msg">Username must be at least 3 characters.</span>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                <span class="error-msg">Please enter a valid email.</span>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
                <div class="strength-bar">
                    <span id="s1"></span>
                    <span id="s2"></span>
                    <span id="s3"></span>
                    <span id="s4"></span>
                </div>
                <span class="strength-label" id="strength-label"></span>
                <span class="error-msg">Password must be at least 6 characters.</span>
            </div>

            <div class="field">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
                <span class="error-msg">Passwords do not match.</span>
            </div>



            <button class="btn-signup" id="signup-btn">Create Account</button>
        </div>



        <p class="signup-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </p>

    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const segments = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
        const strengthLabel = document.getElementById('strength-label');
        const colors = ['#ff4d4d', '#ff914d', '#ffcc00', '#00e676'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];

        function getStrength(pw) {
            let score = 0;
            if (pw.length >= 6)  score++;
            if (pw.length >= 10) score++;
            if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return score;
        }

        passwordInput.addEventListener('input', () => {
            const pw = passwordInput.value;
            const score = pw.length === 0 ? 0 : getStrength(pw);
            segments.forEach((seg, i) => {
                seg.style.background = i < score ? colors[score - 1] : 'var(--line-clr)';
            });
            strengthLabel.textContent = pw.length === 0 ? '' : labels[score - 1] || '';
            strengthLabel.style.color = pw.length === 0 ? '' : colors[score - 1];
        });

        const signupBtn = document.getElementById('signup-btn');

        signupBtn.addEventListener('click', function (e) {
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height);
            ripple.classList.add('ripple');
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
            ripple.style.top  = `${e.clientY - rect.top  - size / 2}px`;
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
            handleSignup();
        });

        function setError(inputId, show) {
            const input = document.getElementById(inputId);
            const msg   = input.nextElementSibling.classList.contains('strength-bar')
                ? input.parentElement.querySelector('.error-msg')
                : input.nextElementSibling.classList.contains('error-msg')
                    ? input.nextElementSibling
                    : null;
            if (!msg) return;
            if (show) { input.classList.add('error'); msg.classList.add('show'); }
            else      { input.classList.remove('error'); msg.classList.remove('show'); }
        }

        function handleSignup() {
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const confirm  = document.getElementById('confirm').value;
            let valid = true;

            if (username.length < 3) { setError('username', true); valid = false; }
            else setError('username', false);

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', true); valid = false; }
            else setError('email', false);

            const pwErr = document.getElementById('password').parentElement.querySelector('.error-msg');
            if (password.length < 6) {
                document.getElementById('password').classList.add('error');
                pwErr.classList.add('show');
                valid = false;
            } else {
                document.getElementById('password').classList.remove('error');
                pwErr.classList.remove('show');
            }

            const confirmInput = document.getElementById('confirm');
            const confirmErr   = confirmInput.nextElementSibling;
            if (confirm !== password || confirm === '') {
                confirmInput.classList.add('error'); confirmErr.classList.add('show'); valid = false;
            } else {
                confirmInput.classList.remove('error'); confirmErr.classList.remove('show');
            }


            if (valid) {
                signupBtn.textContent = 'Creating account…';
                signupBtn.disabled = true;
                
                setTimeout(() => { window.location.href = 'index.html'; }, 1200);
            }
        }   

        document.querySelectorAll('.field input').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error');
                const msg = input.nextElementSibling;
                if (msg && msg.classList.contains('error-msg')) msg.classList.remove('show');
            });
        });
    </script>
</body>
</html>
