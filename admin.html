<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift — Admin Upload</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            grid-template-columns: unset;
            padding: 2rem;
        }

        .admin-card {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line-clr);
            border-radius: 20px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .admin-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }

        .admin-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent-clr);
            line-height: 1;
        }

        .admin-tag {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .field label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .field input[type="text"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--line-clr);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: var(--text-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input[type="text"]:focus {
            border-color: var(--accent-clr);
            box-shadow: 0 0 0 3px rgba(214, 211, 240, 0.1);
        }
        .drop-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .drop-zone {
            border: 2px dashed var(--line-clr);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            min-height: 110px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-clr);
            background: rgba(214, 211, 240, 0.04);
        }

        .drop-zone.ready {
            border-color: #00e676;
            border-style: solid;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon { font-size: 1.8rem; }

        .drop-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .drop-filename {
            font-size: 0.7rem;
            color: var(--accent-clr);
            word-break: break-all;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #cover-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
        }
        .btn-upload {
            width: 100%;
            padding: 0.85rem;
            background: var(--accent-clr);
            border: none;
            border-radius: 99px;
            color: var(--base-clr);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.3px;
        }

        .btn-upload:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-upload:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .progress-wrap {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 5px;
            background: var(--line-clr);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-clr);
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        .progress-label {
            font-size: 0.78rem;
            color: var(--secondary-text-clr);
        }
        .toast {
            display: none;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .toast.success { background: rgba(0, 230, 118, 0.12); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
        .toast.error   { background: rgba(255, 77, 77, 0.12);  color: #ff4d4d;  border: 1px solid rgba(255,77,77,0.3); }
        .uploaded-songs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 260px;
            overflow-y: auto;
        }

        .uploaded-song-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.8rem;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .uploaded-song-item img {
            width: 38px;
            height: 38px;
            border-radius: 5px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .uploaded-song-info { flex-grow: 1; }
        .uploaded-song-title { font-weight: 600; font-size: 0.85rem; }
        .uploaded-song-artist { font-size: 0.72rem; color: var(--secondary-text-clr); }

        .delete-song-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .delete-song-btn:hover { background: rgba(255,77,77,0.1); }

        .section-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary-text-clr);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: -0.5rem;
        }
    </style>
</head>
<body>

<div class="admin-card">

    <div class="admin-header">
        <span class="admin-logo">Rift</span>
        <span class="admin-tag">Admin Upload</span>
    </div>
    <div class="field">
        <label for="title">Song Title</label>
        <input type="text" id="title" placeholder="e.g. Softcore">
    </div>
    <div class="field">
        <label for="artist">Artist</label>
        <input type="text" id="artist" placeholder="e.g. The Neighbourhood">
    </div>
    <div class="field">
        <label for="album">Album</label>
        <input type="text" id="album" placeholder="e.g. Hard to Imagine">
    </div>
    <div class="drop-row">
        <div class="drop-zone" id="audio-zone">
            <input type="file" id="audio-file" accept="audio/*">
            <span class="drop-icon">🎵</span>
            <span class="drop-label">MP3 / Audio</span>
            <span class="drop-filename" id="audio-name">Drop or click</span>
        </div>

        <div class="drop-zone" id="cover-zone">
            <input type="file" id="cover-file" accept="image/*">
            <img id="cover-preview" alt="Cover preview">
            <span class="drop-icon" id="cover-icon">🖼️</span>
            <span class="drop-label">Cover Art</span>
            <span class="drop-filename" id="cover-name">Drop or click</span>
        </div>
    </div>
    <div class="progress-wrap" id="progress-wrap">
        <span class="progress-label" id="progress-label">Uploading…</span>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <button class="btn-upload" id="upload-btn">Upload Song</button>
    <p class="section-title">Songs in database</p>
    <div class="uploaded-songs" id="song-list">
        <p style="font-size:0.8rem; color:var(--secondary-text-clr)">Loading…</p>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://vjhejqbcajtuclbfahhf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqaGVqcWJjYWp0dWNsYmZhaGhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTA3NDAsImV4cCI6MjA5MDg2Njc0MH0.wRdcJJi68TkiziDjkxmLdl-H5kFMbNZmIefoRKMQhxg';

    const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
    };
    const audioInput = document.getElementById('audio-file');
    const coverInput = document.getElementById('cover-file');

    let selectedAudio = null;
    let selectedCover = null;

    function setAudioFile(file) {
        if (!file) return;
        selectedAudio = file;
        document.getElementById('audio-name').textContent = file.name;
        document.getElementById('audio-zone').classList.add('ready');
        const titleInput = document.getElementById('title');
        if (!titleInput.value) {
            titleInput.value = file.name.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
        }
    }

    function setCoverFile(file) {
        if (!file) return;
        selectedCover = file;
        document.getElementById('cover-name').textContent = file.name;
        document.getElementById('cover-zone').classList.add('ready');
        const preview = document.getElementById('cover-preview');
        const icon    = document.getElementById('cover-icon');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        icon.style.display = 'none';
    }

    audioInput.addEventListener('change', () => setAudioFile(audioInput.files[0]));
    coverInput.addEventListener('change', () => setCoverFile(coverInput.files[0]));

    ['audio-zone', 'cover-zone'].forEach(id => {
        const zone = document.getElementById(id);
        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (id === 'audio-zone') setAudioFile(file);
            else setCoverFile(file);
        });
    });
    document.getElementById('upload-btn').addEventListener('click', handleUpload);

    async function handleUpload() {
        const title  = document.getElementById('title').value.trim();
        const artist = document.getElementById('artist').value.trim();
        const album  = document.getElementById('album').value.trim();
        const audioFile = selectedAudio;
        const coverFile = selectedCover;

        if (!title || !artist || !audioFile || !coverFile) {
            showToast('Please fill in Title, Artist, and select both files.', 'error');
            return;
        }

        const btn = document.getElementById('upload-btn');
        btn.disabled = true;
        showProgress(true);

        try {
            setProgress(15, 'Uploading audio…');
            const audioPath = `${Date.now()}_${audioFile.name.replace(/\s+/g, '_')}`;
            const audioUpload = await fetch(`${SUPABASE_URL}/storage/v1/object/audio/${audioPath}`, {
                method: 'POST',
                headers: { ...headers, 'Content-Type': audioFile.type, 'x-upsert': 'true' },
                body: audioFile
            });
            if (!audioUpload.ok) {
                const errBody = await audioUpload.json().catch(() => ({}));
                throw new Error(`Audio upload failed (${audioUpload.status}): ${errBody.message || errBody.error || 'unknown error'}`);
            }
            setProgress(50, 'Uploading cover art…');
            const coverPath = `${Date.now()}_${coverFile.name.replace(/\s+/g, '_')}`;
            const coverUpload = await fetch(`${SUPABASE_URL}/storage/v1/object/covers/${coverPath}`, {
                method: 'POST',
                headers: { ...headers, 'Content-Type': coverFile.type, 'x-upsert': 'true' },
                body: coverFile
            });
            if (!coverUpload.ok) {
                const errBody = await coverUpload.json().catch(() => ({}));
                throw new Error(`Cover upload failed (${coverUpload.status}): ${errBody.message || errBody.error || 'unknown error'}`);
            }
            const audio_url = `${SUPABASE_URL}/storage/v1/object/public/audio/${audioPath}`;
            const image_url = `${SUPABASE_URL}/storage/v1/object/public/covers/${coverPath}`;
            setProgress(80, 'Saving to database…');
            const insert = await fetch(`${SUPABASE_URL}/rest/v1/songs`, {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ title, artist, album, image_url, audio_url })
            });
            if (!insert.ok) {
                const errBody = await insert.json().catch(() => ({}));
                throw new Error(`Database insert failed (${insert.status}): ${errBody.message || errBody.hint || 'unknown error'}`);
            }

            setProgress(100, 'Done!');
            showToast(`✓ "${title}" uploaded successfully!`, 'success');
            resetForm();
            loadSongList();

        } catch (err) {
            showToast(`✗ ${err.message}`, 'error');
            console.error(err);
        } finally {
            btn.disabled = false;
            setTimeout(() => showProgress(false), 1500);
        }
    }
    async function loadSongList() {
        const container = document.getElementById('song-list');
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?select=*&order=created_at.desc`, { headers });
            const songs = await res.json();

            if (!songs.length) {
                container.innerHTML = `<p style="font-size:0.8rem; color:var(--secondary-text-clr)">No songs yet.</p>`;
                return;
            }

            container.innerHTML = songs.map(s => `
                <div class="uploaded-song-item">
                    <img src="${s.image_url}" alt="">
                    <div class="uploaded-song-info">
                        <p class="uploaded-song-title">${s.title}</p>
                        <p class="uploaded-song-artist">${s.artist} · ${s.album || '—'}</p>
                    </div>
                    <button class="delete-song-btn" onclick="deleteSong('${s.id}', '${s.title}')">Delete</button>
                </div>
            `).join('');
        } catch (err) {
            container.innerHTML = `<p style="font-size:0.8rem; color:#ff4d4d">Failed to load songs.</p>`;
        }
    }

    async function deleteSong(id, title) {
        if (!confirm(`Delete "${title}"?`)) return;
        await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${id}`, {
            method: 'DELETE',
            headers
        });
        loadSongList();
    }
    function resetForm() {
        document.getElementById('title').value = '';
        document.getElementById('artist').value = '';
        document.getElementById('album').value = '';
        audioInput.value = '';
        coverInput.value = '';
        selectedAudio = null;
        selectedCover = null;
        document.getElementById('audio-name').textContent = 'Drop or click';
        document.getElementById('cover-name').textContent = 'Drop or click';
        document.getElementById('audio-zone').classList.remove('ready');
        document.getElementById('cover-zone').classList.remove('ready');
        const preview = document.getElementById('cover-preview');
        preview.style.display = 'none';
        document.getElementById('cover-icon').style.display = '';
    }

    function showProgress(show) {
        document.getElementById('progress-wrap').style.display = show ? 'flex' : 'none';
        if (!show) setProgress(0, '');
    }

    function setProgress(pct, label) {
        document.getElementById('progress-fill').style.width = `${pct}%`;
        document.getElementById('progress-label').textContent = label;
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        clearTimeout(toast._t);
        toast._t = setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }
    loadSongList();
</script>
</body>
</html>
